<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container" style="max-width:520px">
  <h3 class="mb-4" th:text="${diagnosis.id == null} ? 'Нова диагноза' : 'Редактиране на диагноза'"></h3>

  <form th:action="${diagnosis.id == null}
              ? @{/diagnoses/create}
              : @{/diagnoses/{id}/edit(id=${diagnosis.id})}"
        th:object="${diagnosis}" method="post" class="card p-4">

    <div class="mb-3">
      <label class="form-label">Наименование <span class="text-danger">*</span></label>
      <input type="text" th:field="*{name}" class="form-control"
             th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Описание</label>
      <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Запази</button>
      <a th:href="@{/diagnoses}" class="btn btn-outline-secondary">Отказ</a>
    </div>
  </form>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
