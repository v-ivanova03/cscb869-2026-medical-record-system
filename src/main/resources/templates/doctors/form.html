<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container" style="max-width:520px">
  <h3 class="mb-4" th:text="${doctor.id == null} ? 'Нов лекар' : 'Редактиране на лекар'"></h3>

  <!-- th:action — динамичен URL (create или edit) -->
  <form th:action="${doctor.id == null} ? @{/doctors/create} : @{/doctors/{id}/edit(id=${doctor.id})}"
        th:object="${doctor}" method="post" class="card p-4">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="mb-3">
      <label class="form-label">Име <span class="text-danger">*</span></label>
      <!-- th:field свързва полето с doctor.name -->
      <input type="text" th:field="*{name}" class="form-control"
             th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
      <!-- Показва грешката от @NotBlank ако има такава -->
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Специалност <span class="text-danger">*</span></label>
      <input type="text" th:field="*{specialty}" class="form-control"
             th:classappend="${#fields.hasErrors('specialty')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{specialty}"></div>
    </div>

    <div class="mb-3 form-check">
      <!-- th:field на boolean генерира checkbox -->
      <input type="checkbox" th:field="*{gp}" class="form-check-input"/>
      <label class="form-check-label">Може да бъде личен лекар</label>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Запази</button>
      <a th:href="@{/doctors}" class="btn btn-outline-secondary">Отказ</a>
    </div>
  </form>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
