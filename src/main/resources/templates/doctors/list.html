<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Лекари</h3>
    <a th:href="@{/doctors/create}" class="btn btn-primary btn-sm"
       sec:authorize="hasRole('ADMIN')">+ Добави лекар</a>
  </div>
  <div class="card">
    <table class="table table-hover mb-0">
      <thead><tr>
        <th>#</th><th>Име</th><th>Специалност</th><th>Личен лекар</th>
        <th sec:authorize="hasRole('ADMIN')">Действия</th>
      </tr></thead>
      <tbody>
      <tr th:each="d : ${doctors}">
        <td th:text="${d.id}"></td>
        <td th:text="${d.name}"></td>
        <td th:text="${d.specialty}"></td>
        <td>
          <span th:if="${d.gp}" class="badge bg-success">Да</span>
          <span th:unless="${d.gp}" class="text-muted">—</span>
        </td>
        <td sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/doctors/{id}/edit(id=${d.id})}" class="btn btn-sm btn-outline-secondary">Редактирай</a>
          <form th:action="@{/doctors/{id}/delete(id=${d.id})}" method="post" class="d-inline"
                onsubmit="return confirm('Изтриване на лекар?')">
            <button class="btn btn-sm btn-outline-danger">Изтрий</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(doctors)}">
        <td colspan="5" class="text-center text-muted py-3">Няма регистрирани лекари.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
