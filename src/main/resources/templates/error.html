<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container text-center mt-5">
  <div class="card p-5" style="max-width:500px;margin:auto">

    <!-- Икона според кода на грешката -->
    <div style="font-size:4rem">
      <i th:if="${status == 403}" class="bi bi-lock"></i>
      <i th:if="${status == 404}" class="bi bi-search"></i>
      <i th:if="${status == 500}" class="bi bi-exclamation-triangle"></i>
      <i th:unless="${status == 403 or status == 404 or status == 500}"
         class="bi bi-x-circle"></i>
    </div>

    <h2 class="mt-3" th:text="${status}">Грешка</h2>

    <p class="text-muted" th:switch="${status}">
      <span th:case="403">Нямате право да достъпите тази страница.</span>
      <span th:case="404">Страницата не беше намерена.</span>
      <span th:case="500">Възникна вътрешна грешка в сървъра.</span>
      <span th:case="*" th:text="${error}">Неочаквана грешка.</span>
    </p>

    <p class="text-danger small"
       th:if="${message}"
       th:text="${message}">
    </p>

    <a href="/" class="btn btn-primary mt-3">
      <i class="bi bi-house"></i>
      Към началната страница
    </a>

  </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
