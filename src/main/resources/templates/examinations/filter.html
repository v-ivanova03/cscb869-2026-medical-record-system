<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container">
  <h3 class="mb-4">Прегледи по лекар и/или период</h3>

  <!-- Филтър форма — GET заявка (параметрите отиват в URL-а) -->
  <form th:action="@{/examinations/filter}" method="get" class="card p-4 mb-4">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Лекар (незадължително)</label>
        <select name="doctorId" class="form-select">
          <option value="">— Всички лекари —</option>
          <option th:each="d : ${doctors}"
                  th:value="${d.id}"
                  th:text="${d.name}"
                  th:selected="${d.id == selectedDoctor}"></option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">От дата</label>
        <input type="date" name="from" class="form-control"
               th:value="${from}"/>
      </div>
      <div class="col-md-4">
        <label class="form-label">До дата</label>
        <input type="date" name="to" class="form-control"
               th:value="${to}"/>
      </div>
    </div>
    <button type="submit" class="btn btn-primary mt-3">Търси</button>
  </form>

  <!-- Резултати -->
  <div class="card" th:if="${examinations != null}">
    <table class="table table-hover mb-0">
      <thead><tr>
        <th>Дата</th><th>Пациент</th><th>Лекар</th>
        <th>Диагноза</th><th>Цена</th>
      </tr></thead>
      <tbody>
      <tr th:each="e : ${examinations}">
        <td th:text="${#temporals.format(e.date,'dd.MM.yyyy')}"></td>
        <td th:text="${e.patientName}"></td>
        <td th:text="${e.doctorName}"></td>
        <td th:text="${e.diagnosisName}"></td>
        <td>
          <span th:if="${e.patientInsured}" class="text-success fw-semibold">НЗОК</span>
          <span th:unless="${e.patientInsured}"
                th:text="${#numbers.formatDecimal(e.price,1,2)} + ' лв.'"></span>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(examinations)}">
        <td colspan="5" class="text-center text-muted py-3">Няма намерени прегледи.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
