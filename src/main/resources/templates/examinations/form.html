<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container" style="max-width:620px">
  <h3 class="mb-4" th:text="${examination.id == null} ? 'Нов преглед' : 'Редактиране на преглед'"></h3>

  <form th:action="${examination.id == null}
              ? @{/examinations/create}
              : @{/examinations/{id}/edit(id=${examination.id})}"
        th:object="${examination}" method="post" class="card p-4">

    <div class="mb-3">
      <label class="form-label">Дата <span class="text-danger">*</span></label>
      <input type="date" th:field="*{date}" class="form-control"
             th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{date}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Лекар <span class="text-danger">*</span></label>
      <select th:field="*{doctorId}" class="form-select"
              th:classappend="${#fields.hasErrors('doctorId')} ? 'is-invalid'">
        <option value="">— Избери лекар —</option>
        <option th:each="d : ${doctors}"
                th:value="${d.id}"
                th:text="${d.name + ' (' + d.specialty + ')'}"></option>
      </select>
      <div class="invalid-feedback" th:errors="*{doctorId}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Пациент <span class="text-danger">*</span></label>
      <select th:field="*{patientId}" class="form-select"
              th:classappend="${#fields.hasErrors('patientId')} ? 'is-invalid'">
        <option value="">— Избери пациент —</option>
        <option th:each="p : ${patients}"
                th:value="${p.id}"
                th:text="${p.name + ' (' + p.egn + ')'}"></option>
      </select>
      <div class="invalid-feedback" th:errors="*{patientId}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Диагноза <span class="text-danger">*</span></label>
      <select th:field="*{diagnosisId}" class="form-select"
              th:classappend="${#fields.hasErrors('diagnosisId')} ? 'is-invalid'">
        <option value="">— Избери диагноза —</option>
        <option th:each="diag : ${diagnoses}"
                th:value="${diag.id}"
                th:text="${diag.name}"></option>
      </select>
      <div class="invalid-feedback" th:errors="*{diagnosisId}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Цена (€) <span class="text-danger">*</span></label>
      <input type="number" step="0.01" min="0" th:field="*{price}" class="form-control"
             th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{price}"></div>
      <div class="form-text">Ако пациентът е здравноосигурен, ще плаща НЗОК.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Назначено лечение</label>
      <textarea th:field="*{treatment}" class="form-control" rows="2"></textarea>
    </div>

    <!-- Болничен лист -->
    <hr/>
    <h6 class="text-muted mb-3">Болничен лист (незадължително)</h6>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Начална дата</label>
        <input type="date" th:field="*{sickLeave.startDate}" class="form-control"/>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Брой дни</label>
        <input type="number" min="1" th:field="*{sickLeave.totalDays}" class="form-control"/>
      </div>
    </div>

    <div class="d-flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">Запази</button>
      <a th:href="@{/examinations}" class="btn btn-outline-secondary">Отказ</a>
    </div>
  </form>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
