<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ==================== HEAD ==================== -->
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Медицинско досие</title>

    <!-- Bootstrap CSS — от CDN, не трябва да сваляш нищо -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- Нашите допълнителни стилове -->
    <link rel="stylesheet" th:href="@{/css/application.css}"/>
</head>

<!-- ==================== NAVBAR ==================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-file-medical"></i>
            Медицинско досие
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/doctors}">Лекари</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                    <a class="nav-link" th:href="@{/patients}">Пациенти</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('PATIENT')">
                    <a class="nav-link" th:href="@{/patients/1/history}">
                        Моето досие
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','DOCTOR')">
                    <a class="nav-link" th:href="@{/examinations}">Прегледи</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/diagnoses}">Диагнози</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        Справки
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/stats}">Всички справки</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li><a class="dropdown-item" th:href="@{/users}">Потребители</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li><a class="dropdown-item" th:href="@{/doctors/stats}">По лекари</a></li>
                        <li><a class="dropdown-item" th:href="@{/examinations/filter}">Прегледи по период</a></li>
                        <li><a class="dropdown-item" th:href="@{/diagnoses}">По диагноза</a></li>
                    </ul>
                </li>

            </ul>

            <!-- Логнат потребител + бутон за изход -->
            <ul class="navbar-nav align-items-center gap-2">
                <li class="nav-item">
                    <span class="text-white-50 small">
                        <sec:authentication property="name"/> |
                        <sec:authentication property="authorities"/>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light btn-sm">Изход</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ==================== FOOTER ==================== -->
<footer th:fragment="footer" class="text-center text-muted py-3 mt-5 border-top">
    © 2026 Медицинско досие — CSCB869
</footer>

<!-- ==================== SCRIPTS ==================== -->
<!--
    Bootstrap JS се добавя в края на ВСЯКА страница така:
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    НЕ може да се сложи тук като fragment защото трябва да е в края на <body>
    — виж всяка HTML страница, там е добавен поотделно.
-->

</html>
