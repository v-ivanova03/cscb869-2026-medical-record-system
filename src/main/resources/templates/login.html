<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card p-4" style="width:360px">
  <h4 class="mb-4 text-center">
    <i class="bi bi-box-arrow-in-right"></i>
    Вход в системата
  </h4>

  <!-- Съобщение при грешна парола -->
  <div th:if="${param.error}" class="alert alert-danger">
    Грешно потребителско име или парола.
  </div>
  <!-- Съобщение след изход -->
  <div th:if="${param.logout}" class="alert alert-info">
    Успешно излязохте от системата.
  </div>

  <!-- th:action — Thymeleaf добавя CSRF token автоматично -->
  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">Потребителско име</label>
      <input type="text" name="username" class="form-control" required autofocus/>
    </div>
    <div class="mb-3">
      <label class="form-label">Парола</label>
      <input type="password" name="password" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-primary w-100">Вход</button>
  </form>

  <div class="mt-3 text-muted small text-center">
    admin / admin123 &nbsp;|&nbsp; doctor1 / doctor123 &nbsp;|&nbsp; patient1 / patient123
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
