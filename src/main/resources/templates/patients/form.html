<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container" style="max-width:520px">
  <h3 class="mb-4" th:text="${patient.id == null} ? 'Нов пациент' : 'Редактиране на пациент'"></h3>

  <form th:action="${patient.id == null} ? @{/patients/create} : @{/patients/{id}/edit(id=${patient.id})}"
        th:object="${patient}" method="post" class="card p-4">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="mb-3">
      <label class="form-label">Пълно име <span class="text-danger">*</span></label>
      <input type="text" th:field="*{name}" class="form-control"
             th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">ЕГН <span class="text-danger">*</span></label>
      <input type="text" th:field="*{egn}" class="form-control" maxlength="10"
             th:classappend="${#fields.hasErrors('egn')} ? 'is-invalid'"/>
      <div class="invalid-feedback" th:errors="*{egn}"></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Личен лекар</label>
      <!-- th:select + th:option генерират <select> от списък -->
      <select th:field="*{gpDoctorId}" class="form-select">
        <option value="" disabled selected>— Изберете личен лекар —</option>
        <option th:each="doc : ${gpDoctors}"
                th:value="${doc.id}"
                th:text="${doc.name}"></option>
      </select>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" th:field="*{insured}" class="form-check-input"/>
      <label class="form-check-label">Здравноосигурен (последните 6 месеца)</label>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Запази</button>
      <a th:href="@{/patients}" class="btn btn-outline-secondary">Отказ</a>
    </div>
  </form>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
